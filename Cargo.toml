[package]
name = "exprs"
version = "0.2.0"
edition = "2021"

[lib]
name = "exprs"
crate-type = ["cdylib"]  # For Python extension

[dependencies]
pyo3 = { version = "0.28", features = ["extension-module"] }
ndarray = "0.15"
rayon = "1.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
numpy = "0.28"
rand = "0.8"
ahash = "0.8"
bincode = "2.0"
lru = "0.12"
itertools = "0.13"
sha2 = "0.10"
tempfile = "3.10"

# Factor storage support
lz4 = "1.28"
uuid = { version = "1.0", features = ["v4"] }

[build-dependencies]
pyo3-build-config = "0.28"