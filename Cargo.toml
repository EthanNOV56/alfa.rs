[package]
name = "alpha-expr"
version = "0.1.0"
edition = "2024"
description = "Alpha expression system inspired by relational algebra and Polars expr API"
authors = ["tip <tip@example.com>"]
license = "MIT OR Apache-2.0"
repository = ""

[dependencies]
rand = "0.8"
thiserror = "1.0"
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"
ndarray = "0.16"
ndarray-stats = "0.6"
rayon = "1.7"
lru = "0.11"
ahash = "0.8"
once_cell = "1.19"
tokio = { version = "1.0", features = ["full"] }
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
serde_json = "1.0"

[dev-dependencies]
criterion = "0.5"
approx = "0.5"

[[bench]]
name = "expression"
harness = false

[[bench]]
name = "optimizer"
harness = false

[[bench]]
name = "timeseries"
harness = false
