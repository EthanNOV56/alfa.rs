[package]
name = "alpha_expr_core"
version = "0.2.0"
edition = "2021"

[lib]
name = "alpha_expr_core"
crate-type = ["cdylib"]  # For Python extension

[dependencies]
pyo3 = { version = "0.20", features = ["extension-module"] }
ndarray = "0.15"
rayon = "1.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
numpy = "0.20"
rand = "0.8"
ahash = "0.8"
bincode = "2.0"
lru = "0.12"
itertools = "0.13"
sha2 = "0.10"
tempfile = "3.10"

[build-dependencies]
pyo3-build-config = "0.20"