[package]
name = "alpha_expr_core"
version = "0.1.0"
edition = "2021"

[lib]
name = "alpha_expr_core"
crate-type = ["cdylib"]  # For Python extension

[dependencies]
pyo3 = { version = "0.20", features = ["extension-module"] }
ndarray = "0.15"
rayon = "1.10"
serde = { version = "1.0", features = ["derive"] }
numpy = "0.20"

[build-dependencies]
pyo3-build-config = "0.20"